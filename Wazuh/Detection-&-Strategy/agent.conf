

<!-- =====================================================================
     SECTION 1 : AGENTS LINUX
     Collecte logs, FIM, SCA, Syscollector
     ===================================================================== -->

<agent_config os="Linux">


  <!-- Authentification (Debian/Ubuntu) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Authentification (RHEL/CentOS/Rocky) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>

  <!-- Journaux système -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Messages kernel -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <!-- Journaux dpkg (Debian/Ubuntu - suivi installations) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- Journaux auditd - REQUIS pour détecter exécutions suspectes -->
  <!-- Nécessite auditd installé + audit.rules configuré -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- Apache2 -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- Nginx -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Connexions réseau actives (monitoring commandes distantes)
       ATTENTION : nécessite logcollector.remote_commands=1 dans
       local_internal_options.conf sur chaque agent Linux -->
  <!-- <localfile>
    <log_format>command</log_format>
    <command>ss -tulpn</command>
    <alias>netstat-monitor</alias>
    <frequency>120</frequency>
  </localfile> -->

  <syscheck>
    <disabled>no</disabled>
    <!-- Scan planifié toutes les 12h -->
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <!-- Alerter sur les nouveaux fichiers dans les répertoires surveillés -->
    <alert_new_files>yes</alert_new_files>

    <!-- Répertoires système critiques - temps réel -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc</directories>
    <directories realtime="yes" check_all="yes">/usr/bin</directories>
    <directories realtime="yes" check_all="yes">/usr/sbin</directories>
    <directories realtime="yes" check_all="yes">/bin</directories>
    <directories realtime="yes" check_all="yes">/sbin</directories>

    <!-- Répertoires home : surveillance des modifications (insider threat) -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/home</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/root</directories>

    <!-- Scripts de démarrage (persistance malware) -->
    <directories realtime="yes" check_all="yes">/etc/init.d</directories>
    <directories realtime="yes" check_all="yes">/etc/cron.d</directories>
    <directories realtime="yes" check_all="yes">/var/spool/cron</directories>

    <!-- Fichiers SSH des utilisateurs (clés, authorized_keys) -->
    <!-- La surveillance /home inclut déjà .ssh - doublon évité -->

    <!-- Exclusions volatiles (réduire faux positifs) -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/ld.so.cache</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/blkid.tab</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore type="sregex">.log$|.swp$|.tmp$|~$</ignore>

    <!-- Activer who-data (nécessite auditd) : identifier QUEL utilisateur a modifié -->
    <whodata>
      <provider>audit</provider>
    </whodata>
  </syscheck>


  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
    <!-- Policy custom organisation (à créer - voir sca_org_workstations.yml) -->
    <!-- <policies>
      <policy>etc/shared/sca_org_workstations.yml</policy>
    </policies> -->
  </sca>


  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
  </wodle>

</agent_config>




<agent_config os="Windows">



  <!-- Canal Sécurité - Authentification, comptes, politiques -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Security</location>
    <query>Event/System[
      EventID=4624 or EventID=4625 or EventID=4648 or
      EventID=4656 or EventID=4663 or EventID=4688 or
      EventID=4698 or EventID=4702 or EventID=4719 or
      EventID=4720 or EventID=4722 or EventID=4724 or
      EventID=4725 or EventID=4728 or EventID=4732 or
      EventID=4740 or EventID=4767 or EventID=4768 or
      EventID=4771 or EventID=4776 or EventID=4798 or
      EventID=4799 or EventID=1102 or EventID=4657
    ]</query>
  </localfile>

  <!-- Canal Système - Services, démarrage, erreurs -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>System</location>
    <query>Event/System[
      EventID=7045 or EventID=7036 or EventID=7040 or
      EventID=104 or EventID=1074 or EventID=6005 or
      EventID=6006 or EventID=4616
    ]</query>
  </localfile>

  <!-- Canal Application -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Application</location>
  </localfile>

  <!-- Sysmon - FORTEMENT RECOMMANDÉ sur tous les postes Windows -->
  <!-- Installer Sysmon v15 + config SwiftOnSecurity ou Olaf Hartong -->
  <!-- https://github.com/SwiftOnSecurity/sysmon-config -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Sysmon/Operational</location>
  </localfile>

  <!-- PowerShell ScriptBlock Logging (détection PS malveillant) -->
  <!-- Activer via GPO : Administrative Templates > Windows PowerShell >
       Turn on Script Block Logging -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <query>Event/System[EventID=4103 or EventID=4104 or EventID=4105 or EventID=4106]</query>
  </localfile>

  <!-- Windows Defender - événements de détection malware -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
    <query>Event/System[
      EventID=1006 or EventID=1007 or EventID=1008 or
      EventID=1009 or EventID=1116 or EventID=1117 or
      EventID=1118 or EventID=1119 or EventID=5001 or
      EventID=5010 or EventID=5012
    ]</query>
  </localfile>

  <!-- Windows Firewall -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Windows Firewall With Advanced Security/Firewall</location>
  </localfile>



  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- Répertoires système critiques Windows -->
    <directories realtime="yes" check_all="yes">%WINDIR%\System32\drivers\etc</directories>
    <directories realtime="yes" check_all="yes">%WINDIR%\System32\wbem</directories>
    <directories realtime="yes" check_all="yes">%WINDIR%\System32\WindowsPowerShell</directories>
    <directories realtime="yes" check_all="yes">%WINDIR%\SysWOW64</directories>
    <directories realtime="yes" check_all="yes">%PROGRAMDATA%\Microsoft\Windows\Start Menu\Programs\StartUp</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">%PROGRAMFILES%</directories>

    <!-- Profils utilisateurs (insider threat / malware persistence) -->
    <directories realtime="yes" check_all="yes" report_changes="yes">%USERPROFILE%\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</directories>

    <!-- Registre Windows - Clés de persistance (MITRE T1547) -->
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Wow6432Node\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session Manager\Environment</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Winlogon</windows_registry>
    <!-- AppInit_DLLs - DLL injection -->
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Windows</windows_registry>

    <!-- Exclusions -->
    <ignore type="sregex">.log$|.tmp$|Prefetch|.etl$</ignore>
  </syscheck>



  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

 

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
    <!-- Hotfixes Windows - essentiel pour Vulnerability Detector -->
    <hotfixes>yes</hotfixes>
  </wodle>

</agent_config>



<agent_config name="^(srv-web|web-|nginx-)">

  <!-- Logs spécifiques aux serveurs web -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- Logs SSL/TLS -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Monitoring taille des répertoires uploads/données sensibles -->
  <localfile>
    <log_format>command</log_format>
    <command>du -sh /var/www/html/uploads 2>/dev/null || echo "no-uploads-dir"</command>
    <alias>webdir-monitor</alias>
    <frequency>3600</frequency>
  </localfile>

</agent_config>